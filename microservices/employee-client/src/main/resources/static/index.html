<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Employee CRUD</title>
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
	<div class="container">
		<h1>Employee CRUD</h1>
		<p class="subtitle">index.html &rarr; employee-client (Feign) &rarr; MS-create / MS-read / MS-update / MS-delete, via Eureka</p>

		<div class="card">
			<h2 id="form-title">Add Employee</h2>
			<form id="employee-form">
				<input type="hidden" id="employee-id">
				<div class="form-row">
					<div>
						<label>Name</label>
						<input type="text" id="name" required>
					</div>
					<div>
						<label>Email</label>
						<input type="email" id="email" required>
					</div>
					<div>
						<label>Department</label>
						<input type="text" id="department" required>
					</div>
					<div>
						<label>Salary</label>
						<input type="number" id="salary" step="0.01" required>
					</div>
				</div>
				<div class="form-actions">
					<button type="submit" class="btn-primary" id="submit-btn">Add Employee</button>
					<button type="button" class="btn-secondary" id="cancel-btn" style="display:none;">Cancel</button>
				</div>
			</form>
		</div>

		<table>
			<thead>
				<tr>
					<th>ID</th>
					<th>Name</th>
					<th>Email</th>
					<th>Department</th>
					<th>Salary</th>
					<th>Actions</th>
				</tr>
			</thead>
			<tbody id="employee-rows"></tbody>
		</table>
	</div>

	<script>
		const API = "/api/employees";

		const form = document.getElementById("employee-form");
		const idField = document.getElementById("employee-id");
		const nameField = document.getElementById("name");
		const emailField = document.getElementById("email");
		const departmentField = document.getElementById("department");
		const salaryField = document.getElementById("salary");
		const formTitle = document.getElementById("form-title");
		const submitBtn = document.getElementById("submit-btn");
		const cancelBtn = document.getElementById("cancel-btn");
		const rowsBody = document.getElementById("employee-rows");

		async function loadEmployees() {
			const res = await fetch(API);
			const employees = await res.json();

			rowsBody.innerHTML = "";

			if (employees.length === 0) {
				rowsBody.innerHTML = '<tr><td colspan="6" class="empty-state">No employees yet - add one above.</td></tr>';
				return;
			}

			employees.forEach(emp => {
				const tr = document.createElement("tr");
				tr.innerHTML = `
					<td>${emp.id}</td>
					<td>${emp.name}</td>
					<td>${emp.email}</td>
					<td>${emp.department}</td>
					<td>${emp.salary}</td>
					<td class="row-actions">
						<button class="btn-edit" data-id="${emp.id}">Edit</button>
						<button class="btn-delete" data-id="${emp.id}">Delete</button>
					</td>
				`;
				rowsBody.appendChild(tr);
			});
		}

		function resetForm() {
			form.reset();
			idField.value = "";
			formTitle.textContent = "Add Employee";
			submitBtn.textContent = "Add Employee";
			cancelBtn.style.display = "none";
		}

		form.addEventListener("submit", async (e) => {
			e.preventDefault();

			const employee = {
				name: nameField.value,
				email: emailField.value,
				department: departmentField.value,
				salary: parseFloat(salaryField.value)
			};

			const id = idField.value;

			if (id) {
				await fetch(`${API}/${id}`, {
					method: "PUT",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify(employee)
				});
			} else {
				await fetch(API, {
					method: "POST",
					headers: { "Content-Type": "application/json" },
					body: JSON.stringify(employee)
				});
			}

			resetForm();
			loadEmployees();
		});

		rowsBody.addEventListener("click", async (e) => {
			const id = e.target.getAttribute("data-id");
			if (!id) return;

			if (e.target.classList.contains("btn-delete")) {
				await fetch(`${API}/${id}`, { method: "DELETE" });
				loadEmployees();
			}

			if (e.target.classList.contains("btn-edit")) {
				const res = await fetch(`${API}/${id}`);
				const emp = await res.json();

				idField.value = emp.id;
				nameField.value = emp.name;
				emailField.value = emp.email;
				departmentField.value = emp.department;
				salaryField.value = emp.salary;

				formTitle.textContent = "Edit Employee";
				submitBtn.textContent = "Save Changes";
				cancelBtn.style.display = "inline-block";
			}
		});

		cancelBtn.addEventListener("click", resetForm);

		loadEmployees();
	</script>
</body>
</html>
